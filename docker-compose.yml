version: '3.8'

services:

  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db

    environment:
      ORACLE_PASSWORD: oracle

    ports:
      - "1521:1521"

    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'SELECT 1 FROM dual;' | sqlplus -s system/oracle@localhost:1521/XEPDB1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  petfamily-api:
    build: .
    container_name: petfamily-api

    depends_on:
      oracle-db:
        condition: service_healthy

    ports:
      - "9090:8080"