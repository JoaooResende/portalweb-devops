version: '3.8'

services:

  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db
    environment:
      ORACLE_PASSWORD: oracle
    ports:
      - "1521:1521"

  petfamily-api:
    build: .
    container_name: petfamily-api
    depends_on:
      - oracle-db
    ports:
      - "8080:8080"